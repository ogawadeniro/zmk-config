CONFIG_ZMK_KEYBOARD_NAME="bots40"

### zmk studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_ZMK_BLE=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y

##### 共通設定 #####
### LED
CONFIG_RGBLED_WIDGET=y
#CONFIG_RGBLED_WIDGET_INTERVAL_MS=250

# 充電レベルのしきい値
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=80
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=20
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10

# BlueToothステータス（接続中）
CONFIG_RGBLED_WIDGET_CONN_COLOR_CONNECTED=6
CONFIG_RGBLED_WIDGET_CONN_COLOR_ADVERTISING=5

# 充電ステータスの色 80青/緑/黄/赤
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_HIGH=4
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_MEDIUM=2
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_LOW=3
CONFIG_RGBLED_WIDGET_BATTERY_COLOR_CRITICAL=1
